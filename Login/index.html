<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillChain — Log In</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/Login/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <!-- NAV -->
  <header class="navbar">
    <!-- Logo -->
    <div class="logo-container">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6l-8-4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="logo-text">SkillChain</span>
    </div>

    <!-- Desktop + mobile dropdown nav -->
    <nav class="nav-links" id="sc-nav-links">
      <a href="/register">Find Workers</a>
      <a href="/login">Log in</a>
      <a href="/register" class="btn-signup">Sign up</a>
    </nav>

    <!-- Hamburger (mobile) -->
    <button class="nav-hamburger" id="sc-hamburger" aria-label="Menu" aria-expanded="false" aria-controls="sc-nav-links">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- MAIN -->
  <main class="login-container">

    <div class="welcome-section">
      <svg class="nav-logo__icon" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6l-8-4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>Welcome back</h1>
      <p>Log in to your SkillChain account</p>
    </div>

    <div class="login-card">
      <form id="loginForm">

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="name@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" id="toggle-pw" aria-label="Toggle password visibility">👁</button>
          </div>
        </div>

        <button type="submit" class="btn-signin" id="submit-btn">
          <span id="submit-text">Sign In</span>
          <span id="submit-spinner"></span>
        </button>

      </form>

      <p class="signup-link">Don't have an account? <a href="/register">Sign up</a></p>
      <a href="/forgot-password" class="form-footer__forgot">Forgot password?</a>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-logo">
      <svg class="nav-logo__icon" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6l-8-4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>SkillChain</span>
    </div>
    <p>Marketplace for informal workers. Proof of Life verification unlocks payment.</p>
    <p>© 2026 SkillChain. All rights reserved.</p>
  </footer>

  <script src="/Login/script.js"></script>
</body>
</html>
